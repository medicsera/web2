name: Spring boot CI

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  check-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Load .env
        run: cat .env >> $GITHUB_ENV

      - name: Compile Spring app
        run: ./mvnw clean

      - name: Run Spring app tests
        run: ./mvnw test